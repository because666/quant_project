<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苹果极简高级风格示例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
            background: #FFFFFF;
            color: #1D1D1F;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 粒子背景 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #1D1D1F;
            letter-spacing: -0.02em;
        }

        .nav-menu {
            display: flex;
            gap: 40px;
        }

        .nav-item {
            font-size: 14px;
            font-weight: 500;
            color: #1D1D1F;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .nav-item:hover {
            color: #0071E3;
            transform: translateY(-2px);
        }

        .nav-icons {
            display: flex;
            gap: 20px;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .nav-icon:hover {
            opacity: 1;
        }

        /* Hero 区域 */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 32px;
            position: relative;
            overflow: hidden;
        }

        .hero-title {
            font-size: 64px;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.1;
            text-align: center;
            margin-bottom: 24px;
            animation: blurFadeIn 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .hero-subtitle {
            font-size: 21px;
            font-weight: 400;
            line-height: 1.5;
            color: #86868B;
            text-align: center;
            max-width: 600px;
            animation: blurFadeInLight 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.3s backwards;
        }

        .hero-visual {
            margin-top: 80px;
            position: relative;
            width: 400px;
            height: 400px;
            animation: blurFadeIn 1.2s cubic-bezier(0.25, 0.1, 0.25, 1) 0.6s backwards;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .circle-1 {
            width: 340px;
            height: 340px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(245, 245, 247, 0.8);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            animation: breathe 4s ease-in-out infinite;
        }

        .circle-2 {
            width: 240px;
            height: 240px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(232, 232, 237, 0.6);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02);
            animation: breathe 4s ease-in-out infinite 0.3s;
        }

        .circle-3 {
            width: 140px;
            height: 140px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 113, 227, 0.2);
            box-shadow: 0 2px 8px rgba(0, 113, 227, 0.1);
            animation: breathe 4s ease-in-out infinite 0.6s;
        }

        /* 内容网格 */
        .content-section {
            padding: 160px 64px 120px;
            background: #F5F5F7;
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.1;
            text-align: center;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(30px);
        }

        .section-title.fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.06),
                0 5px 12px rgba(0, 0, 0, 0.04);
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
        }

        .product-card.fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .product-card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .product-card:nth-child(3) {
            animation-delay: 0.2s;
        }

        .product-card:nth-child(4) {
            animation-delay: 0.3s;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                circle at var(--x, 50%) var(--y, 50%),
                rgba(0, 113, 227, 0.08) 0%,
                transparent 60%
            );
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            pointer-events: none;
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-card:hover {
            transform: scale(1.02);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.1),
                0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .card-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .card-icon svg {
            width: 32px;
            height: 32px;
        }

        .card-icon.blue {
            background: linear-gradient(135deg, rgba(0, 113, 227, 0.12) 0%, rgba(0, 113, 227, 0.06) 100%);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.12);
        }

        .card-icon.blue svg {
            stroke: rgba(0, 113, 227, 0.85);
        }

        .card-icon.gold {
            background: linear-gradient(135deg, rgba(245, 230, 211, 0.15) 0%, rgba(245, 230, 211, 0.08) 100%);
            box-shadow: 0 4px 12px rgba(245, 230, 211, 0.35);
        }

        .card-icon.gold svg {
            stroke: rgba(200, 160, 120, 0.85);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #1D1D1F;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .card-description {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
            color: #86868B;
        }

        /* CTA 按钮 */
        .cta-section {
            padding: 120px 64px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .cta-button {
            display: inline-block;
            padding: 16px 32px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.85);
            color: #1D1D1F;
            font-size: 16px;
            font-weight: 500;
            border-radius: 12px;
            border: 1px solid rgba(224, 224, 224, 0.8);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
        }

        .cta-button:hover {
            border-color: rgba(0, 113, 227, 0.5);
            box-shadow: 
                0 0 15px rgba(0, 113, 227, 0.25),
                0 8px 20px rgba(0, 113, 227, 0.12);
            transform: scale(1.03);
        }

        /* 动画 */
        @keyframes blurFadeIn {
            from {
                filter: blur(10px);
                opacity: 0;
            }
            to {
                filter: blur(0);
                opacity: 1;
            }
        }

        @keyframes blurFadeInLight {
            from {
                filter: blur(5px);
                opacity: 0;
            }
            to {
                filter: blur(0);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes breathe {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        /* 响应式 */
        @media (max-width: 1023px) {
            .hero-title {
                font-size: 48px;
            }

            .content-section {
                padding: 120px 48px;
            }

            .section-title {
                font-size: 36px;
            }

            .cta-section {
                padding: 100px 48px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 24px;
            }

            .nav-menu {
                display: none;
            }

            .hero {
                padding: 80px 24px;
            }

            .hero-title {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .hero-visual {
                width: 280px;
                height: 280px;
                margin-top: 60px;
            }

            .circle-1 {
                width: 240px;
                height: 240px;
            }

            .circle-2 {
                width: 160px;
                height: 160px;
            }

            .circle-3 {
                width: 80px;
                height: 80px;
            }

            .content-section {
                padding: 80px 32px;
            }

            .section-title {
                font-size: 32px;
                margin-bottom: 60px;
            }

            .product-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .product-card {
                padding: 32px;
            }

            .cta-section {
                padding: 80px 32px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">Minimal</div>
        <div class="nav-menu">
            <div class="nav-item">产品</div>
            <div class="nav-item">功能</div>
            <div class="nav-item">定价</div>
            <div class="nav-item">关于</div>
        </div>
        <div class="nav-icons">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="hero">
        <h1 class="hero-title">极简设计<br>极致体验</h1>
        <p class="hero-subtitle">专注于本质，去除一切多余。用最简洁的方式，传递最纯粹的价值。</p>
        <div class="hero-visual">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </section>

    <!-- 内容网格 -->
    <section class="content-section">
        <h2 class="section-title">核心功能</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="card-icon blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <h3 class="card-title">智能分析</h3>
                <p class="card-description">基于先进算法，提供精准的数据分析和洞察，帮助您做出明智决策。</p>
            </div>
            <div class="product-card">
                <div class="card-icon gold">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <h3 class="card-title">实时监控</h3>
                <p class="card-description">全天候监控系统状态，及时发现并预警潜在问题，确保业务稳定运行。</p>
            </div>
            <div class="product-card">
                <div class="card-icon gold">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                    </svg>
                </div>
                <h3 class="card-title">自动化流程</h3>
                <p class="card-description">简化复杂流程，自动化重复任务，提升工作效率，释放创造力。</p>
            </div>
            <div class="product-card">
                <div class="card-icon blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h3 class="card-title">数据安全</h3>
                <p class="card-description">采用银行级加密技术，多重备份机制，确保您的数据安全无忧。</p>
            </div>
        </div>
    </section>

    <!-- CTA 区域 -->
    <section class="cta-section">
        <button class="cta-button">立即开始</button>
    </section>

    <script>
        // 粒子系统
        class ParticleSystem {
            constructor() {
                this.canvas = document.getElementById('particles-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.mouse = { x: null, y: null, radius: 150 };
                
                this.init();
                this.animate();
                this.setupEventListeners();
            }

            init() {
                this.resize();
                this.createParticles();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            createParticles() {
                const particleCount = 45;
                for (let i = 0; i < particleCount; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        baseX: Math.random() * this.canvas.width,
                        baseY: Math.random() * this.canvas.height,
                        size: Math.random() * 4 + 3,
                        speedX: (Math.random() - 0.5) * 0.4,
                        speedY: (Math.random() - 0.5) * 0.4,
                        opacity: Math.random() * 0.15 + 0.35,
                        color: Math.random() > 0.5 ? '#E8E8ED' : '#F5E6D3',
                        originalColor: Math.random() > 0.5 ? '#E8E8ED' : '#F5E6D3'
                    });
                }
            }

            setupEventListeners() {
                window.addEventListener('resize', () => {
                    this.resize();
                    this.particles = [];
                    this.createParticles();
                });

                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.x;
                    this.mouse.y = e.y;
                });

                window.addEventListener('mouseout', () => {
                    this.mouse.x = null;
                    this.mouse.y = null;
                });

                // 卡片聚光灯效果
                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = ((e.clientX - rect.left) / rect.width) * 100;
                        const y = ((e.clientY - rect.top) / rect.height) * 100;
                        card.style.setProperty('--x', `${x}%`);
                        card.style.setProperty('--y', `${y}%`);
                    });
                });

                // 导航栏滚动效果
                window.addEventListener('scroll', () => {
                    const navbar = document.querySelector('.navbar');
                    if (window.scrollY > 50) {
                        navbar.classList.add('scrolled');
                    } else {
                        navbar.classList.remove('scrolled');
                    }
                });
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.particles.forEach(particle => {
                    // Perlin Noise 随机漫步（极慢速度）
                    particle.x += particle.speedX;
                    particle.y += particle.speedY;

                    // 边界检测
                    if (particle.x < 0 || particle.x > this.canvas.width) particle.speedX *= -1;
                    if (particle.y < 0 || particle.y > this.canvas.height) particle.speedY *= -1;

                    // 鼠标交互
                    if (this.mouse.x !== null && this.mouse.y !== null) {
                        const dx = this.mouse.x - particle.x;
                        const dy = this.mouse.y - particle.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < this.mouse.radius) {
                            const force = (this.mouse.radius - distance) / this.mouse.radius;
                            const angle = Math.atan2(dy, dx);
                            particle.x -= Math.cos(angle) * force * 15;
                            particle.y -= Math.sin(angle) * force * 15;
                        }
                    }

                    // 缓慢复位
                    particle.x += (particle.baseX - particle.x) * 0.02;
                    particle.y += (particle.baseY - particle.y) * 0.02;

                    // 绘制柔和圆形模糊光斑 - 双层发光
                    for (let layer = 0; layer < 2; layer++) {
                        const layerSize = layer === 0 ? particle.size * 2.5 : particle.size;
                        const layerOpacity = layer === 0 ? particle.opacity * 0.4 : particle.opacity;
                        
                        this.ctx.beginPath();
                        this.ctx.arc(particle.x, particle.y, layerSize, 0, Math.PI * 2);
                        
                        const gradient = this.ctx.createRadialGradient(
                            particle.x, particle.y, 0,
                            particle.x, particle.y, layerSize
                        );
                        
                        const opacityHex = Math.round(layerOpacity * 255).toString(16).padStart(2, '0');
                        gradient.addColorStop(0, `${particle.originalColor}${opacityHex}`);
                        gradient.addColorStop(1, `${particle.originalColor}00`);
                        
                        this.ctx.fillStyle = gradient;
                        this.ctx.fill();
                    }
                });

                requestAnimationFrame(() => this.animate());
            }
        }

        // 初始化粒子系统
        new ParticleSystem();

        // 滚动动画
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('fade-in-up');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.section-title, .product-card').forEach(el => {
            observer.observe(el);
        });
    </script>
</body>
</html>
