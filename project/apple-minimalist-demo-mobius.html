<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苹果极简高级风格 - 莫比乌斯粒子河</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
            background: #FFFFFF;
            color: #1D1D1F;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Three.js 背景层 */
        #mobius-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #1D1D1F;
            letter-spacing: -0.02em;
        }

        .nav-menu {
            display: flex;
            gap: 40px;
        }

        .nav-item {
            font-size: 14px;
            font-weight: 500;
            color: #1D1D1F;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .nav-item:hover {
            color: #0071E3;
            transform: translateY(-2px);
        }

        .nav-icons {
            display: flex;
            gap: 20px;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .nav-icon:hover {
            opacity: 1;
        }

        /* Hero 区域 */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 32px;
            position: relative;
            overflow: hidden;
        }

        .hero-title {
            font-size: 64px;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.1;
            text-align: center;
            margin-bottom: 24px;
            animation: blurFadeIn 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            text-shadow: 0 2px 20px rgba(255, 255, 255, 0.8);
        }

        .hero-subtitle {
            font-size: 21px;
            font-weight: 400;
            line-height: 1.5;
            color: #86868B;
            text-align: center;
            max-width: 600px;
            animation: blurFadeInLight 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.3s backwards;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.8);
        }

        /* 内容网格 */
        .content-section {
            padding: 160px 64px 120px;
            background: rgba(245, 245, 247, 0.95);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.1;
            text-align: center;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(30px);
        }

        .section-title.fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.06),
                0 5px 12px rgba(0, 0, 0, 0.04);
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .product-card.fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .product-card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .product-card:nth-child(3) {
            animation-delay: 0.2s;
        }

        .product-card:nth-child(4) {
            animation-delay: 0.3s;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                circle at var(--x, 50%) var(--y, 50%),
                rgba(0, 113, 227, 0.08) 0%,
                transparent 60%
            );
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            pointer-events: none;
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-card:hover {
            transform: scale(1.02);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.1),
                0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .card-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .card-icon svg {
            width: 32px;
            height: 32px;
        }

        .card-icon.blue {
            background: linear-gradient(135deg, rgba(0, 113, 227, 0.12) 0%, rgba(0, 113, 227, 0.06) 100%);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.12);
        }

        .card-icon.blue svg {
            stroke: rgba(0, 113, 227, 0.85);
        }

        .card-icon.gold {
            background: linear-gradient(135deg, rgba(245, 230, 211, 0.15) 0%, rgba(245, 230, 211, 0.08) 100%);
            box-shadow: 0 4px 12px rgba(245, 230, 211, 0.35);
        }

        .card-icon.gold svg {
            stroke: rgba(200, 160, 120, 0.85);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #1D1D1F;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .card-description {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
            color: #86868B;
        }

        /* CTA 按钮 */
        .cta-section {
            padding: 120px 64px;
            text-align: center;
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
        }

        .cta-button {
            display: inline-block;
            padding: 16px 32px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.9);
            color: #1D1D1F;
            font-size: 16px;
            font-weight: 500;
            border-radius: 12px;
            border: 1px solid rgba(224, 224, 224, 0.8);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
        }

        .cta-button:hover {
            border-color: rgba(0, 113, 227, 0.5);
            box-shadow: 
                0 0 15px rgba(0, 113, 227, 0.25),
                0 8px 20px rgba(0, 113, 227, 0.12);
            transform: scale(1.03);
        }

        /* 动画 */
        @keyframes blurFadeIn {
            from {
                filter: blur(10px);
                opacity: 0;
            }
            to {
                filter: blur(0);
                opacity: 1;
            }
        }

        @keyframes blurFadeInLight {
            from {
                filter: blur(5px);
                opacity: 0;
            }
            to {
                filter: blur(0);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 1023px) {
            .hero-title {
                font-size: 48px;
            }

            .content-section {
                padding: 120px 48px;
            }

            .section-title {
                font-size: 36px;
            }

            .cta-section {
                padding: 100px 48px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 24px;
            }

            .nav-menu {
                display: none;
            }

            .hero {
                padding: 80px 24px;
            }

            .hero-title {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .content-section {
                padding: 80px 32px;
            }

            .section-title {
                font-size: 32px;
                margin-bottom: 60px;
            }

            .product-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .product-card {
                padding: 32px;
            }

            .cta-section {
                padding: 80px 32px;
            }
        }
    </style>
</head>
<body>
    <div id="mobius-canvas"></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">Minimal</div>
        <div class="nav-menu">
            <div class="nav-item">产品</div>
            <div class="nav-item">功能</div>
            <div class="nav-item">定价</div>
            <div class="nav-item">关于</div>
        </div>
        <div class="nav-icons">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="hero">
        <h1 class="hero-title">极简设计<br>极致体验</h1>
        <p class="hero-subtitle">专注于本质，去除一切多余。用最简洁的方式，传递最纯粹的价值。</p>
    </section>

    <!-- 内容网格 -->
    <section class="content-section">
        <h2 class="section-title">核心功能</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="card-icon blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <h3 class="card-title">智能分析</h3>
                <p class="card-description">基于先进算法，提供精准的数据分析和洞察，帮助您做出明智决策。</p>
            </div>
            <div class="product-card">
                <div class="card-icon gold">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <h3 class="card-title">实时监控</h3>
                <p class="card-description">全天候监控系统状态，及时发现并预警潜在问题，确保业务稳定运行。</p>
            </div>
            <div class="product-card">
                <div class="card-icon gold">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                    </svg>
                </div>
                <h3 class="card-title">自动化流程</h3>
                <p class="card-description">简化复杂流程，自动化重复任务，提升工作效率，释放创造力。</p>
            </div>
            <div class="product-card">
                <div class="card-icon blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h3 class="card-title">数据安全</h3>
                <p class="card-description">采用银行级加密技术，多重备份机制，确保您的数据安全无忧。</p>
            </div>
        </div>
    </section>

    <!-- CTA 区域 -->
    <section class="cta-section">
        <button class="cta-button">立即开始</button>
    </section>

    <script>
        // Three.js 真正的3D莫比乌斯环粒子河
        class MobiusParticleRiver {
            constructor() {
                this.container = document.getElementById('mobius-canvas');
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.particles = [];
                this.mouse = { x: 0, y: 0, normalizedX: 0, normalizedY: 0 };
                this.clock = new THREE.Clock();
                this.mobiusGroup = new THREE.Group();
                
                this.init();
                this.createMobiusRiver();
                this.setupEventListeners();
                this.animate();
            }

            init() {
                // 场景
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xFFFFFF);

                // 相机 - 3D透视
                const aspect = window.innerWidth / window.innerHeight;
                this.camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 2000);
                this.camera.position.set(0, 15, 40);
                this.camera.lookAt(0, 0, 0);

                // 渲染器
                this.renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);

                // 添加莫比乌斯环组到场景
                this.scene.add(this.mobiusGroup);
            }

            // 真正的莫比乌斯环参数方程
            getMobiusPoint(u, v, R, w) {
                // u: 0-2π，沿环的角度
                // v: -1到1，环的宽度方向
                const cosU = Math.cos(u);
                const sinU = Math.sin(u);
                const cosU2 = Math.cos(u / 2);
                const sinU2 = Math.sin(u / 2);
                
                const x = (R + v * w * cosU2) * cosU;
                const y = (R + v * w * cosU2) * sinU;
                const z = v * w * sinU2;
                
                return new THREE.Vector3(x, y, z);
            }

            // 创建莫比乌斯河流
            createMobiusRiver() {
                const R = 18; // 环的半径（加大）
                const w = 6;  // 环的宽度（加大）
                
                // 创建粒子系统 - 500个粒子
                const particleCount = 500;
                
                for (let i = 0; i < particleCount; i++) {
                    // 在莫比乌斯环表面均匀分布
                    const u = (i / particleCount) * Math.PI * 2;
                    const v = (Math.random() * 2 - 1); // -1到1
                    
                    const particle = {
                        u: u,
                        v: v,
                        baseU: u,
                        baseV: v,
                        speed: 0.3 + Math.random() * 0.2, // 流动速度
                        size: 0.15 + Math.random() * 0.15, // 很小的粒子
                        opacity: 0.2 + Math.random() * 0.25, // 0.2-0.45
                        isBlue: Math.random() < 0.7, // 70%蓝色
                        phase: Math.random() * Math.PI * 2,
                        R: R,
                        w: w,
                        mesh: null
                    };

                    // 创建粒子
                    const geometry = new THREE.SphereGeometry(particle.size, 8, 8);
                    
                    const color = particle.isBlue ? 0x0071E3 : 0xF5E6D3;
                    const material = new THREE.MeshBasicMaterial({
                        color: color,
                        transparent: true,
                        opacity: particle.opacity
                    });

                    particle.mesh = new THREE.Mesh(geometry, material);
                    
                    // 设置初始位置
                    const pos = this.getMobiusPoint(particle.u, particle.v, R, w);
                    particle.mesh.position.copy(pos);
                    
                    this.mobiusGroup.add(particle.mesh);
                    this.particles.push(particle);
                }

                // 添加河流线条 - 12条主线
                this.createRiverLines(R, w);
            }

            // 创建河流线条
            createRiverLines(R, w) {
                const lineCount = 12;
                
                for (let i = 0; i < lineCount; i++) {
                    const v = (i / (lineCount - 1)) * 2 - 1; // -1到1
                    const points = [];
                    const segments = 150;
                    
                    for (let j = 0; j <= segments; j++) {
                        const u = (j / segments) * Math.PI * 2;
                        const point = this.getMobiusPoint(u, v, R, w);
                        points.push(point);
                    }
                    
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    
                    const isBlue = i % 2 === 0;
                    const color = isBlue ? 0x0071E3 : 0xF5E6D3;
                    
                    const material = new THREE.LineBasicMaterial({
                        color: color,
                        transparent: true,
                        opacity: 0.12
                    });
                    
                    const line = new THREE.Line(geometry, material);
                    this.mobiusGroup.add(line);
                }
            }

            setupEventListeners() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                    this.mouse.normalizedX = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.normalizedY = -(e.clientY / window.innerHeight) * 2 + 1;
                });

                // 卡片聚光灯效果
                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = ((e.clientX - rect.left) / rect.width) * 100;
                        const y = ((e.clientY - rect.top) / rect.height) * 100;
                        card.style.setProperty('--x', `${x}%`);
                        card.style.setProperty('--y', `${y}%`);
                    });
                });

                // 导航栏滚动效果
                window.addEventListener('scroll', () => {
                    const navbar = document.querySelector('.navbar');
                    if (window.scrollY > 50) {
                        navbar.classList.add('scrolled');
                    } else {
                        navbar.classList.remove('scrolled');
                    }
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                const deltaTime = this.clock.getDelta();
                const elapsedTime = this.clock.getElapsedTime();

                // 整个莫比乌斯环的3D旋转
                this.mobiusGroup.rotation.x = Math.sin(elapsedTime * 0.1) * 0.1;
                this.mobiusGroup.rotation.y += 0.002; // 缓慢自转
                this.mobiusGroup.rotation.z = Math.PI / 6; // 15度倾斜

                // 呼吸效果
                const breathScale = 1 + Math.sin(elapsedTime * 0.5) * 0.02;
                this.mobiusGroup.scale.set(breathScale, breathScale, breathScale);

                // 鼠标位置转换为3D
                const mouseVector = new THREE.Vector3(
                    this.mouse.normalizedX * 25,
                    this.mouse.normalizedY * 15,
                    10
                );

                // 更新粒子
                this.particles.forEach((particle) => {
                    // 沿u方向流动
                    particle.u += particle.speed * deltaTime * 0.1;
                    if (particle.u > Math.PI * 2) particle.u -= Math.PI * 2;

                    // 获取新位置
                    let position = this.getMobiusPoint(particle.u, particle.v, particle.R, particle.w);

                    // 添加波浪效果
                    const wave = Math.sin(elapsedTime * 2 + particle.phase) * 0.5;
                    position.y += wave;

                    // 鼠标交互
                    const worldPosition = position.clone();
                    worldPosition.applyMatrix4(this.mobiusGroup.matrixWorld);
                    
                    const distanceToMouse = worldPosition.distanceTo(mouseVector);
                    const interactionRadius = 8;

                    let targetOpacity = particle.opacity;

                    if (distanceToMouse < interactionRadius) {
                        const force = (interactionRadius - distanceToMouse) / interactionRadius;
                        
                        // 避让效果
                        const avoidDir = position.clone().normalize();
                        position.add(avoidDir.multiplyScalar(force * 2));

                        // 高亮
                        targetOpacity = 0.7;
                    }

                    // 平滑过渡
                    particle.mesh.material.opacity += (targetOpacity - particle.mesh.material.opacity) * 0.1;
                    particle.mesh.position.copy(position);
                });

                // 渲染
                this.renderer.render(this.scene, this.camera);
            }
        }

        // 初始化
        window.addEventListener('load', () => {
            if (typeof THREE !== 'undefined') {
                new MobiusParticleRiver();
            }
        });

        // 滚动动画
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('fade-in-up');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.section-title, .product-card').forEach(el => {
            observer.observe(el);
        });
    </script>
</body>
</html>
